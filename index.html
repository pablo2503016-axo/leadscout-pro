<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadScout Pro — Find Internships Near You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --indigo: #4f46e5;
    --teal: #0891b2;
    --amber: #f59e0b;
    --ink: #0f172a;
    --muted: #475569;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background-image: linear-gradient(165deg, rgba(49,46,77,0.85) 0%, rgba(67,61,108,0.8) 50%, rgba(85,79,130,0.72) 100%), url("https://github.com/user-attachments/assets/1372a80a-70aa-41ef-baaa-b3df3f9c76c0");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: scroll;
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }
  .brand {
    color: #fff;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.02em;
    padding: 8px 0 56px;
  }
  .brand span { color: #fbbf24; }
  .hero { text-align: center; color: #fff; }
  .eyebrow {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.15);
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 20px;
  }
  h1.headline {
    font-size: 44px;
    line-height: 1.15;
    font-weight: 800;
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }
  p.subheadline {
    font-size: 18px;
    line-height: 1.6;
    color: rgba(255,255,255,0.88);
    max-width: 560px;
    margin: 0 auto 40px;
  }
  .video-placeholder {
    background: rgba(15, 23, 42, 0.35);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 16px;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 44px;
  }
  .play-button {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    color: var(--indigo);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .video-placeholder p {
    color: rgba(255,255,255,0.75);
    font-size: 14px;
  }
  .zip-card {
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 20px 50px rgba(15,23,42,0.25);
    text-align: left;
  }
  .zip-card label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .input-group { display: flex; gap: 10px; }
  .input-group input {
    flex: 1;
    padding: 14px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--indigo);
  }
  .input-group button {
    padding: 14px 22px;
    border: none;
    border-radius: 10px;
    background: var(--amber);
    color: #1f2937;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
  }
  .input-group button:hover { background: #fbbf24; }
  .error-msg { color: #dc2626; font-size: 13px; margin-top: 8px; display: none; }
  @media (max-width: 480px) {
    h1.headline { font-size: 32px; }
    .input-group { flex-direction: column; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">LeadScout <span>Pro</span></div>
    <div class="hero">
      <span class="eyebrow">For Students</span>
      <h1 class="headline">Internships Are Closer Than You Think</h1>
      <p class="subheadline">LeadScout Pro scouts local businesses near you that are looking for student interns — so you can skip the national job boards and build experience close to home.</p>

      <div class="video-placeholder">
        <div class="play-button">&#9658;</div>
        <p>Demo video coming soon</p>
      </div>

      <div class="zip-card">
        <form id="zipForm" novalidate>
          <label for="zip">Enter your ZIP code to get started</label>
          <div class="input-group">
            <input type="text" id="zip" name="zip" placeholder="e.g. 90210" inputmode="numeric" maxlength="10">
            <button type="submit">Find Businesses</button>
          </div>
          <p class="error-msg" id="zipError">Please enter a valid 5-digit ZIP code.</p>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('zipForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var zipInput = document.getElementById('zip');
      var error = document.getElementById('zipError');
      var zip = zipInput.value.trim();
      var isValid = /^\d{5}(-\d{4})?$/.test(zip);

      if (!isValid) {
        error.style.display = 'block';
        zipInput.focus();
        return;
      }
      error.style.display = 'none';
      window.location.href = 'survey.html?zip=' + encodeURIComponent(zip);
    });
  </script>
</body>
</html>
